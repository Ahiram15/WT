<!DOCTYPE html>
<html>
<head>
 <link rel="stylesheet" href="style.css?v=1">
 <script src="register.js"></script>
</head>
<body>
 <div>
 <i><h1>REGISTRATION PAGE</h1></i>

 <label><b>Username</b></label><br>
 <input id="username" placeholder="Enter Username"><br><br>
 
 <label><b>Password</b></label><br>
 <input id="password" type="password" placeholder="Enter Password"><br><br>
 
 <label><b>Confirm Password</b></label><br>
 <input id="confirmpassword" type="password" placeholder="Re-Enter Password"><br><br>
 
 <label><b>Email</b></label><br>
 <input id="email" placeholder="Enter Email"><br><br>
 
 <label><b>Mobile</b></label><br>
 <input id="mobile" placeholder="Enter Mobile Number"><br><br>
 
 <label><b>Date of Birth</b></label><br>
 <input type="date"><br><br>

 <label><b>Address</b></label><br>
 <textarea placeholder="Enter Address"></textarea><br><br>

 <label><b>Gender</b></label><br>
 <select>
 <option>Male</option>
 <option>Female</option>
 <option>Others</option>
 </select><br><br>

 <button type="button" onclick="check()"><b>Submit</b></button>
 </div>
</body>
</html>
