<!DOCTYPE html>
<html>
<head>
 <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
 <div>
 <i><h1>FORGOT PASSWORD PAGE</h1></i>
 
 <label><b>New Password</b></label><br>
 <input id="new" type="password" placeholder="Enter New Password"><br><br>
 
 <label><b>Confirm Password</b></label><br>
 <input id="confirm" type="password" placeholder="Re-Enter New Password"><br><br>

 <button type="button" onclick="check()"><b>Submit</b></button>
 </div>
 <script>
 function check(){
  let newpass = document.getElementById("new").value
  let confirmpass = document.getElementById("confirm").value
  if(newpass!=confirmpass){
   alert("Enter Correct Password")
  }else{
   alert("Password is Changed Successfully!")
  }
 }
 </script>
</body>
</html>
